  - title: "[BUFFER] Create and seed race_calendar DB table — all 2026 rounds"
    assignees: []
    labels: ["increment-3", "backend", "data", "buffer"]
    milestone: "Increment 3"
    body: |
      ## Description
      Multiple endpoints (`/api/races/next`, `/api/races/upcoming`, auto-updater
      scheduler) all depend on a `race_calendar` table with `end_datetime` UTC for
      each 2026 round. This table does not exist yet.

      ## Tasks
