  - title: "[ML] Wire f1_winner_model_v2.pkl into /api/predictions/ — real inference"
    assignees: ["julissasu"] # Julissa
    labels: ["increment-3", "ml", "core"]
    milestone: "Increment 3"
    body: |
      ## Description
      `POST /api/predictions/` currently returns 3 hardcoded drivers and never
      invokes the model. `predictor.py` has a TODO in the function body. Fix both.

      ## Tasks
      - [ ] Complete the function body in `predictor.py` — load `f1_winner_model_v2.pkl`
            using `joblib.load()` and run actual inference
      - [ ] Map incoming request payload `{ circuit_id, weather, starting_grid }`
            to the feature vector the model expects
      - [ ] Return a proper ranked result: list of 22 drivers sorted by predicted
            finish position with confidence scores
      - [ ] The `/api/predictions/` route handler should call the real predictor
            function — remove the hardcoded 3-driver return
      - [ ] Test locally: POST a real payload and confirm ranked output (not placeholder)
      - [ ] Document the feature vector format in a comment so future teammates
            can understand input/output contract

      ## Notes
      If the model's feature engineering requires fields not in the request payload
      (e.g. historical stats), the predictor can look them up from the DB internally.
      Confidence scores should be honest — 45–50% exact winner range is expected.

