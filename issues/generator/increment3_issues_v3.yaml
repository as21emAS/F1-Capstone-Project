            `round (int PK), race_name, circuit_id (FK), location, country,
             start_datetime (UTC), end_datetime (UTC), is_sprint (bool)`
      - [ ] Seed all 2026 rounds with accurate UTC end datetimes
            (race ends approx. 2 hours after scheduled race start)
      - [ ] Update `GET /api/races/next` to query this table against `NOW()` —
            no hardcoded race values anywhere in the codebase
      - [ ] Provide a seed script or Alembic data migration so any teammate can
            populate their local DB with `alembic upgrade head`

  - title: "[BE] Auto-updater: APScheduler setup + Jolpica fetch jobs (API side)"
    assignees: ["YulissaFu"]
    labels: ["increment-3", "backend", "core"]
    milestone: "Increment 3"
    body: |
      ## Description
      Set up APScheduler in FastAPI and implement the Jolpica-F1 fetch functions
      that run after each race weekend. This is the external API / scheduling half
      of the auto-updater. Liv owns the DB write half (see companion issue).

      Per FRONTEND_REDESIGN_v3 Prompt 9.

      ## Tasks
      - [ ] Install and configure APScheduler in the FastAPI app (add to startup)
      - [ ] Schedule trigger: run ~2 hours after each race weekend's `end_datetime`
            in `race_calendar` (date-aware trigger, not a fixed interval)
      - [ ] Implement `fetch_driver_standings()` — calls
            `https://api.jolpi.ca/ergast/f1/2026/driverStandings/`, parses response,
            returns normalized list ready for DB upsert
      - [ ] Implement `fetch_constructor_standings()` — same pattern for constructors
      - [ ] Implement `fetch_race_results(round)` — calls
            `https://api.jolpi.ca/ergast/f1/2026/results/`, parses and normalizes
      - [ ] Add a manual trigger endpoint `POST /api/admin/sync` that calls the
            full job on demand (no auth — internal testing only)
      - [ ] Add job-level logging (job start, data fetched, rows returned, any errors)

      ## Dependency
      `race_calendar` table must exist (buffer issue). Coordinate with Liv on
      the normalized data shape her upsert functions expect.

  - title: "[BE] Auto-updater: DB upsert + cache invalidation (DB side)"
    assignees: ["or22a"]
    labels: ["increment-3", "backend", "core"]
    milestone: "Increment 3"
    body: |
      ## Description
      Implement the database write half of the auto-updater job. Yulissa's fetch
      functions return normalized data — this issue is about receiving that data
      and writing it correctly to the DB, then invalidating stale caches.

      ## Tasks
      - [ ] Implement `upsert_driver_standings(data)` — upsert into `driver_standings`
            table; on conflict update points, position, win_chance
      - [ ] Implement `upsert_team_standings(data)` — same for `team_standings`
      - [ ] Implement `insert_race_results(data)` — insert new rows into `race_results`
            with fields: `race_id, circuit_id, driver_id, team_id, grid_position,
            finish_position, points_scored, race_date` (schema per data contract issue)
      - [ ] Invalidate cached responses for `/api/championship/standings`,
            `/api/championship/team-standings`, `/api/races/next`, `/api/races/upcoming`
            after each successful write
      - [ ] Add row-level logging (how many rows inserted/updated per table)
      - [ ] Coordinate with Yulissa: agree on the normalized dict shape passed
            between her fetch functions and these upsert functions

      ## Dependency
      ML training data schema must be locked (Julissa + Alex) before
      `insert_race_results` schema is finalized.

